<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>tréximo - Câmara d'O Escolhido</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/camera.css">
</head>

<body>
    <div class="camera-container">
        <!-- Top HUD -->
        <header class="hud-header">
            <div class="timer-warning">
                <div class="pulsing-red-circle"></div>
                <span id="countdown" class="countdown-text">01:00</span>
            </div>
            <div class="logo-text">tr<span class="logo-accent">é</span>ximo</div>
        </header>

        <!-- Viewfinder Brackets -->
        <div class="viewfinder-brackets">
            <div class="bracket top-left"></div>
            <div class="bracket top-right"></div>
            <div class="bracket bottom-left"></div>
            <div class="bracket bottom-right"></div>

            <!-- Mission Overlay -->
            <div class="mission-overlay">
                <h2 class="mission-title">É O TEU TRÉXIMO!</h2>
                <p class="mission-text">APANHA PELO MENOS 3 PESSOAS COM OS PÉS NO AR.</p>
            </div>
        </div>

        <!-- Primary Action -->
        <div class="bottom-controls">
            <button class="icon-button flash-icon">⚡</button>
            <button id="shutterButton" class="shutter-button">
                <div class="shutter-inner"></div>
            </button>
            <button class="icon-button flip-icon">🔄</button>
        </div>

        <!-- System Overlays -->
        <div id="flashOverlay" class="flash-overlay hidden"></div>
        <div id="loadingOverlay" class="system-overlay hidden">
            <p>A ENVIAR PARA O FEED GLOBAL...</p>
        </div>
        <div id="successOverlay" class="system-overlay hidden success">
            <p>FOTO ENVIADA! BÓRA CORRER.</p>
        </div>
        <div id="timeoutOverlay" class="system-overlay hidden timeout">
            <p>TEMPO ESGOTADO.<br>O CLUBE PERDEU A FOTO DE HOJE.</p>
        </div>
    </div>

    <script src="js/camera.js"></script>
</body>

</html>
