<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>tréximo - SPA App</title>
    <!-- Use Google Fonts for Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        /* ================================
           GLOBAL VARIABLES & NORMALIZATION
           ================================ */
        :root {
            --bg-primary: #000000;
            --bg-card: #111111;
            --bg-card-hover: #1A1A1A;
            --accent-volt: #CCFF00;
            --text-main: #FFFFFF;
            --text-secondary: #A0A0A0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', 'SF Pro Display', 'Montserrat', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            line-height: 1.5;
            overflow-x: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* Routing/State Management */
        .spa-view {
            width: 100vw;
            height: 100vh;
            position: absolute;
            top: 0;
            left: 0;
            opacity: 1;
            transition: opacity 0.4s ease;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .spa-view.hidden {
            opacity: 0;
            pointer-events: none;
            display: none !important;
        }

        /* Developer Tool (Top-left absolute) */
        .dev-trigger-btn {
            position: absolute;
            top: 8px;
            left: 8px;
            background-color: #222222;
            color: #777777;
            border: 1px solid #333333;
            padding: 4px 8px;
            font-size: 0.65rem;
            border-radius: 4px;
            z-index: 999;
            cursor: pointer;
            font-family: monospace;
            opacity: 0.6;
        }

        .dev-trigger-btn:hover {
            opacity: 1;
        }

        /* ================================
           VIEW 1: HOME (GRUPO)
           ================================ */
        #view-home {
            display: flex;
            flex-direction: column;
            padding-bottom: 120px;
            /* Space for fixed bottom action */
        }

        .home-top-nav {
            display: flex;
            justify-content: space-between;
            padding: 24px 32px 16px;
        }

        .home-nav-tab {
            background: transparent;
            border: none;
            font-family: inherit;
            font-size: 1.25rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: -0.5px;
        }

        .home-nav-tab.text-secondary {
            color: var(--text-secondary);
        }

        .home-nav-tab.active {
            color: var(--text-main);
            position: relative;
        }

        .home-nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 100%;
            height: 3px;
            background-color: var(--accent-volt);
            border-radius: 2px;
        }

        .home-content-area {
            padding: 0 24px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .home-hero {
            margin-top: 16px;
        }

        .home-hero-title {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
            margin-bottom: 8px;
            line-height: 1.1;
        }

        .home-hero-subtitle {
            font-size: 1rem;
            color: var(--text-secondary);
            font-weight: 600;
        }

        .home-metric-card {
            background-color: var(--bg-card);
            border-radius: 24px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .home-card-label {
            font-size: 0.875rem;
            color: var(--text-secondary);
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .home-massive-number {
            font-size: 3.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            line-height: 1;
        }

        .home-progress-bg {
            width: 100%;
            height: 6px;
            background-color: #333333;
            border-radius: 4px;
            overflow: hidden;
        }

        .home-progress-fill {
            width: 80%;
            height: 100%;
            background-color: var(--accent-volt);
            border-radius: 4px;
        }

        .home-streak-section {
            background-color: transparent;
        }

        .home-avatar-row {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 24px;
        }

        .home-streak-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .home-avatar {
            width: 64px;
            height: 64px;
            background-color: var(--bg-card);
            border-radius: 50%;
            border: 2px solid transparent;
        }

        .home-streak-item.active .home-avatar {
            border-color: var(--accent-volt);
            width: 80px;
            height: 80px;
        }

        .home-streak-info {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 700;
            font-size: 1rem;
        }

        .home-bottom-action {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 24px;
            background: linear-gradient(to top, rgba(0, 0, 0, 1) 50%, rgba(0, 0, 0, 0));
            z-index: 10;
        }

        .home-massive-cta {
            width: 100%;
            background-color: var(--accent-volt);
            color: var(--bg-primary);
            font-family: inherit;
            font-size: 2rem;
            font-weight: 900;
            text-transform: uppercase;
            border: none;
            border-radius: 100px;
            padding: 20px 0;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
            letter-spacing: -1px;
        }

        .home-massive-cta.checked-in {
            background-color: #222222;
            color: var(--accent-volt);
            cursor: default;
        }

        /* Pace Modal overlay */
        .home-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(4px);
            z-index: 20;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .home-modal-overlay.hidden {
            opacity: 0;
            pointer-events: none;
            display: block !important;
            /* Keep block for transition */
        }

        /* Needed specific override for modal hidden */
        .home-modal-overlay[style*="display: none"] {
            display: none !important;
        }

        .home-bottom-sheet {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--bg-card);
            border-top-left-radius: 32px;
            border-top-right-radius: 32px;
            padding: 16px 24px 48px;
            z-index: 30;
            transform: translateY(0);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .home-bottom-sheet.hidden {
            transform: translateY(100%);
            display: block !important;
        }

        .home-modal-handle {
            width: 48px;
            height: 4px;
            background-color: #333333;
            border-radius: 2px;
            margin: 0 auto 24px;
        }

        .home-modal-title {
            font-size: 1.25rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 24px;
            letter-spacing: -0.5px;
        }

        .home-pace-options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .home-pace-btn {
            width: 100%;
            background-color: var(--bg-primary);
            color: var(--text-main);
            border: 1px solid #333333;
            border-radius: 100px;
            padding: 18px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s, border-color 0.2s;
        }

        .home-pace-btn:active {
            background-color: var(--bg-card-hover);
            border-color: var(--text-main);
        }


        /* ================================
           VIEW 2: CAMERA (ROULETTE)
           ================================ */
        #view-camera {
            background-color: #111111;
            /* Simulated camera feed */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
            padding: 24px;
        }

        .cam-hud-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .cam-timer-warning {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 100px;
            backdrop-filter: blur(4px);
        }

        .cam-pulsing-circle {
            width: 12px;
            height: 12px;
            background-color: #FF3333;
            border-radius: 50%;
            animation: pulse 1s infinite alternate;
        }

        @keyframes pulse {
            from {
                opacity: 0.4;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1.1);
            }
        }

        .cam-countdown-text {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--text-main);
            font-variant-numeric: tabular-nums;
        }

        .cam-logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .cam-logo-accent {
            color: var(--accent-volt);
        }

        .cam-viewfinder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80%;
            height: 60%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .cam-bracket {
            position: absolute;
            width: 40px;
            height: 40px;
            border-color: rgba(255, 255, 255, 0.5);
            border-style: solid;
        }

        .cam-bracket.top-l {
            top: 0;
            left: 0;
            border-width: 3px 0 0 3px;
        }

        .cam-bracket.top-r {
            top: 0;
            right: 0;
            border-width: 3px 3px 0 0;
        }

        .cam-bracket.bot-l {
            bottom: 0;
            left: 0;
            border-width: 0 0 3px 3px;
        }

        .cam-bracket.bot-r {
            bottom: 0;
            right: 0;
            border-width: 0 3px 3px 0;
        }

        .cam-mission-overlay {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 100px;
            padding: 16px 32px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .cam-mission-title {
            color: var(--accent-volt);
            font-size: 1.125rem;
            font-weight: 900;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cam-mission-text {
            color: var(--text-main);
            font-size: 0.875rem;
            font-weight: 600;
            line-height: 1.2;
        }

        .cam-bottom-controls {
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
            padding-bottom: 24px;
            width: 100%;
        }

        .cam-icon-btn {
            background: none;
            border: none;
            color: var(--text-main);
            font-size: 1.5rem;
            cursor: pointer;
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            backdrop-filter: blur(4px);
        }

        .cam-shutter-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid var(--text-main);
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .cam-shutter-btn:active {
            transform: scale(0.95);
        }

        .cam-shutter-inner {
            width: 64px;
            height: 64px;
            background-color: var(--accent-volt);
            border-radius: 50%;
        }

        .cam-flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: white;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.1s;
        }

        .cam-flash-overlay.active {
            opacity: 1;
        }

        .cam-system-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 40;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 24px;
        }

        .cam-system-overlay p {
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            line-height: 1.4;
        }


        /* ================================
           VIEW 3: REVEAL
           ================================ */
        #view-reveal {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .rev-photo-area {
            height: 75%;
            position: relative;
            border-bottom-left-radius: 32px;
            border-bottom-right-radius: 32px;
            overflow: hidden;
            background-color: #222222;
            /* In SPA context, use CSS animation triggered by class adding */
            transform: scale(0.95);
            opacity: 0;
        }

        #view-reveal:not(.hidden) .rev-photo-area {
            animation: revRevealPhoto 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes revRevealPhoto {
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .rev-photo-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #111111, #333333);
            background-size: cover;
            background-position: center;
        }

        .rev-vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.8) 100%);
            pointer-events: none;
        }

        .rev-stamp {
            position: absolute;
            bottom: 24px;
            left: 24px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            opacity: 0;
            transform: translateY(20px);
        }

        #view-reveal:not(.hidden) .rev-stamp {
            animation: revSlideFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            animation-delay: 0.3s;
        }

        @keyframes revSlideFadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .rev-stamp-row {
            font-weight: 800;
            line-height: 1.1;
        }

        .rev-stamp-row.tag {
            font-size: 0.75rem;
            color: var(--text-main);
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .rev-stamp-row.distance {
            font-size: 2.5rem;
            color: var(--text-main);
            letter-spacing: -1px;
        }

        .rev-stamp-row.pace {
            font-size: 0.875rem;
            color: var(--accent-volt);
            letter-spacing: 0.5px;
        }

        .rev-interaction-zone {
            height: 25%;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 24px;
            opacity: 0;
        }

        #view-reveal:not(.hidden) .rev-interaction-zone {
            animation: revFadeIn 0.5s ease forwards;
            animation-delay: 0.5s;
        }

        @keyframes revFadeIn {
            to {
                opacity: 1;
            }
        }

        .rev-reaction-row {
            display: flex;
            justify-content: space-between;
            padding: 0 16px;
        }

        .rev-reaction-btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: var(--bg-card);
            border: none;
            font-size: 1.75rem;
            cursor: pointer;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s, background-color 0.2s;
        }

        .rev-reaction-btn:active {
            transform: scale(0.9);
        }

        .rev-reaction-btn.acted {
            background-color: var(--accent-volt);
            transform: scale(1.1);
        }

        .rev-plus-one {
            position: absolute;
            top: -20px;
            color: var(--accent-volt);
            font-weight: 900;
            font-size: 1.25rem;
            pointer-events: none;
            opacity: 0;
        }

        .rev-plus-one.animate {
            animation: revFloatUp 0.8s ease-out forwards;
        }

        @keyframes revFloatUp {
            0% {
                transform: translateY(0) scale(0.5);
                opacity: 1;
            }

            50% {
                transform: translateY(-20px) scale(1.2);
                opacity: 1;
            }

            100% {
                transform: translateY(-40px) scale(1);
                opacity: 0;
            }
        }

        .rev-share-btn {
            width: 100%;
            background-color: var(--accent-volt);
            color: var(--bg-primary);
            font-family: inherit;
            font-size: 1.25rem;
            font-weight: 900;
            text-transform: uppercase;
            border: none;
            border-radius: 100px;
            padding: 20px 0;
            cursor: pointer;
            transition: background-color 0.3s, color 0.3s;
            letter-spacing: -0.5px;
        }

        .global-toast {
            position: fixed;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--accent-volt);
            color: var(--bg-primary);
            padding: 16px 24px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 0.875rem;
            z-index: 100;
            text-align: center;
            box-shadow: 0 8px 32px rgba(204, 255, 0, 0.2);
            opacity: 1;
            transition: opacity 0.3s;
            pointer-events: none;
        }

        .global-toast.hidden {
            opacity: 0;
        }
    </style>
</head>

<body>

    <!-- Developer Trigger (Hidden Flow) -->
    <button id="devTriggerAlarm" class="dev-trigger-btn">Dev: Force Alarm</button>

    <!-- Global Toast Notification -->
    <div id="globalToast" class="global-toast hidden">STORY GERADA COM SUCESSO.</div>

    <!-- ==========================================
         VIEW 1: HOME (GRUPO)
         ========================================== -->
    <div id="view-home" class="spa-view">
        <header class="home-top-nav">
            <button class="home-nav-tab text-secondary">FY</button>
            <button class="home-nav-tab active">GRUPO</button>
        </header>

        <main class="home-content-area">
            <section class="home-hero">
                <h1 class="home-hero-title">TREINO DE TERÇA</h1>
                <p class="home-hero-subtitle">19:30 &bull; Parque Eduardo VII</p>
            </section>

            <section class="home-metric-card">
                <h2 class="home-card-label">KM TOTAIS ESTE MÊS</h2>
                <div class="home-massive-number">1,240 KM</div>
                <div class="home-progress-bg">
                    <div class="home-progress-fill"></div>
                </div>
            </section>

            <section class="home-streak-section">
                <div class="home-avatar-row">
                    <div class="home-streak-item">
                        <div class="home-avatar"></div>
                        <div class="home-streak-info">
                            <span class="flame">🔥</span> <span class="streak-count">10</span>
                        </div>
                    </div>
                    <div class="home-streak-item active">
                        <div class="home-avatar"></div>
                        <div class="home-streak-info">
                            <span class="flame">🔥</span> <span class="streak-count">12</span>
                        </div>
                    </div>
                    <div class="home-streak-item">
                        <div class="home-avatar"></div>
                        <div class="home-streak-info">
                            <span class="flame">🔥</span> <span class="streak-count">8</span>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <div class="home-bottom-action">
            <button id="homeInButton" class="home-massive-cta">IN</button>
        </div>

        <div id="homeModalOverlay" class="home-modal-overlay hidden"></div>
        <div id="homePaceModal" class="home-bottom-sheet hidden">
            <div class="home-modal-handle"></div>
            <h2 class="home-modal-title">ESCOLHE O TEU RITMO</h2>
            <div class="home-pace-options">
                <button class="home-pace-btn">Coelho (&lt; 4:30/km)</button>
                <button class="home-pace-btn">Médio (5:00 - 6:00/km)</button>
                <button class="home-pace-btn">Social (&gt; 6:30/km)</button>
                <button class="home-pace-btn">Caminhada</button>
            </div>
        </div>
    </div>

    <!-- ==========================================
         VIEW 2: CAMERA (ROULETTE)
         ========================================== -->
    <div id="view-camera" class="spa-view hidden">
        <header class="cam-hud-header">
            <div class="cam-timer-warning">
                <div class="cam-pulsing-circle"></div>
                <span id="camCountdown" class="cam-countdown-text">01:00</span>
            </div>
            <div class="cam-logo">tr<span class="cam-logo-accent">é</span>ximo</div>
        </header>

        <div class="cam-viewfinder">
            <div class="cam-bracket top-l"></div>
            <div class="cam-bracket top-r"></div>
            <div class="cam-bracket bot-l"></div>
            <div class="cam-bracket bot-r"></div>

            <div class="cam-mission-overlay">
                <h2 class="cam-mission-title">É O TEU TRÉXIMO!</h2>
                <p class="cam-mission-text">APANHA PELO MENOS 3 PESSOAS COM OS PÉS NO AR.</p>
            </div>
        </div>

        <div class="cam-bottom-controls">
            <button class="cam-icon-btn">⚡</button>
            <button id="camShutterBtn" class="cam-shutter-btn">
                <div class="cam-shutter-inner"></div>
            </button>
            <button class="cam-icon-btn">🔄</button>
        </div>

        <div id="camFlashOverlay" class="cam-flash-overlay hidden"></div>
        <div id="camLoadingOverlay" class="cam-system-overlay hidden">
            <p>A ENVIAR...</p>
        </div>
    </div>

    <!-- ==========================================
         VIEW 3: REVEAL (REWARD)
         ========================================== -->
    <div id="view-reveal" class="spa-view hidden">
        <div class="rev-photo-area">
            <div class="rev-vignette"></div>
            <div class="rev-photo-placeholder"></div>

            <div class="rev-stamp">
                <div class="rev-stamp-row tag">TRÉXIMO &bull; LISBOA</div>
                <div class="rev-stamp-row distance">12.4 KM</div>
                <div class="rev-stamp-row pace">PACE MÉDIO: 5:15/KM</div>
            </div>
        </div>

        <div class="rev-interaction-zone">
            <div class="rev-reaction-row">
                <button class="rev-reaction-btn">
                    <span class="emoji">🔥</span>
                    <span class="rev-plus-one hidden">+1</span>
                </button>
                <button class="rev-reaction-btn">
                    <span class="emoji">👟</span>
                    <span class="rev-plus-one hidden">+1</span>
                </button>
                <button class="rev-reaction-btn">
                    <span class="emoji">💦</span>
                    <span class="rev-plus-one hidden">+1</span>
                </button>
                <button class="rev-reaction-btn">
                    <span class="emoji">🚀</span>
                    <span class="rev-plus-one hidden">+1</span>
                </button>
            </div>

            <button id="revShareBtn" class="rev-share-btn">PARTILHAR NO INSTAGRAM</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- STATE MANAGEMENT / ROUTING ---
            const viewHome = document.getElementById('view-home');
            const viewCamera = document.getElementById('view-camera');
            const viewReveal = document.getElementById('view-reveal');

            function showView(viewElement) {
                // Hide all
                viewHome.classList.add('hidden');
                viewCamera.classList.add('hidden');
                viewReveal.classList.add('hidden');

                // Show target
                setTimeout(() => {
                    viewElement.classList.remove('hidden');
                }, 50); // slight delay for smooth transition setup
            }

            // --- DEV TRIGGER ROUTING ---
            const devTriggerBtn = document.getElementById('devTriggerAlarm');
            devTriggerBtn.addEventListener('click', () => {
                showView(viewCamera);
                startCameraCountdown();
            });


            // --- HOME EVENT LOGIC ---
            const homeInButton = document.getElementById('homeInButton');
            const homePaceModal = document.getElementById('homePaceModal');
            const homeModalOverlay = document.getElementById('homeModalOverlay');
            const homePaceBtns = document.querySelectorAll('.home-pace-btn');

            homeInButton.addEventListener('click', () => {
                if (!homeInButton.classList.contains('checked-in')) {
                    homeModalOverlay.classList.remove('hidden');
                    homePaceModal.classList.remove('hidden');
                    // Allow browser paint
                    setTimeout(() => {
                        homePaceModal.style.transform = 'translateY(0)';
                    }, 10);
                }
            });

            const closeHomeModal = () => {
                homePaceModal.style.transform = 'translateY(100%)';
                homeModalOverlay.style.opacity = '0';

                setTimeout(() => {
                    homePaceModal.classList.add('hidden');
                    homeModalOverlay.classList.add('hidden');
                    homePaceModal.style.transform = '';
                    homeModalOverlay.style.opacity = '';
                }, 400);
            };

            homeModalOverlay.addEventListener('click', closeHomeModal);

            homePaceBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    closeHomeModal();
                    homeInButton.textContent = 'DENTRO';
                    homeInButton.style.color = '#CCFF00';
                    homeInButton.style.backgroundColor = '#222222';
                    homeInButton.classList.add('checked-in');
                });
            });


            // --- CAMERA EVENT LOGIC ---
            const camCountdownEl = document.getElementById('camCountdown');
            const camShutterBtn = document.getElementById('camShutterBtn');
            const camFlashOverlay = document.getElementById('camFlashOverlay');
            const camLoadingOverlay = document.getElementById('camLoadingOverlay');
            let timerInterval;

            function startCameraCountdown() {
                let timeLeft = 60;
                camCountdownEl.textContent = "01:00";
                camCountdownEl.style.color = '#FFFFFF';

                timerInterval = setInterval(() => {
                    timeLeft--;
                    if (timeLeft >= 0) {
                        const s = timeLeft.toString().padStart(2, '0');
                        camCountdownEl.textContent = `00:${s}`;
                        if (timeLeft <= 10) camCountdownEl.style.color = '#FF3333';
                    } else {
                        clearInterval(timerInterval);
                    }
                }, 1000);
            }

            camShutterBtn.addEventListener('click', () => {
                clearInterval(timerInterval); // Stop clock

                // Flash
                camFlashOverlay.classList.remove('hidden');
                camFlashOverlay.classList.add('active');

                setTimeout(() => {
                    camFlashOverlay.classList.remove('active');
                    setTimeout(() => camFlashOverlay.classList.add('hidden'), 100);

                    // Loading State
                    camLoadingOverlay.classList.remove('hidden');

                    // Route to Reveal after 1.5s
                    setTimeout(() => {
                        camLoadingOverlay.classList.add('hidden');
                        showView(viewReveal);

                        // Hide Dev Trigger on reveal since flow is done
                        devTriggerBtn.style.display = 'none';
                    }, 1500);

                }, 100);
            });


            // --- REVEAL EVENT LOGIC ---
            const revReactionBtns = document.querySelectorAll('.rev-reaction-btn');
            const revShareBtn = document.getElementById('revShareBtn');
            const globalToast = document.getElementById('globalToast');

            revReactionBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    btn.classList.add('acted');
                    setTimeout(() => btn.classList.remove('acted'), 300);

                    const plusOne = btn.querySelector('.rev-plus-one');
                    plusOne.classList.remove('hidden', 'animate');
                    void plusOne.offsetWidth; // Reflow
                    plusOne.classList.add('animate');

                    setTimeout(() => {
                        plusOne.classList.remove('animate');
                        plusOne.classList.add('hidden');
                    }, 800);
                });
            });

            revShareBtn.addEventListener('click', () => {
                globalToast.classList.remove('hidden');
                setTimeout(() => {
                    globalToast.classList.add('hidden');
                }, 3000);
            });
        });
    </script>
</body>

</html>
