<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>tréximo - O Reveal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/reveal.css">
</head>

<body>
    <div class="reveal-container">
        <!-- Layer 1 & 2: Photo Area & Stamp -->
        <div class="photo-area">
            <div class="vignette-overlay"></div>
            <!-- Placeholder for actual photo -->
            <div class="photo-placeholder"></div>

            <div class="treximo-stamp">
                <div class="stamp-row tag">TRÉXIMO &bull; LISBOA</div>
                <div class="stamp-row distance">12.4 KM</div>
                <div class="stamp-row pace">PACE MÉDIO: 5:15/KM</div>
            </div>
        </div>

        <!-- Layer 3: Interaction Zone -->
        <div class="interaction-zone">
            <div class="reaction-row">
                <button class="reaction-btn" data-emoji="🔥">
                    <span class="emoji">🔥</span>
                    <span class="plus-one hidden">+1</span>
                </button>
                <button class="reaction-btn" data-emoji="👟">
                    <span class="emoji">👟</span>
                    <span class="plus-one hidden">+1</span>
                </button>
                <button class="reaction-btn" data-emoji="💦">
                    <span class="emoji">💦</span>
                    <span class="plus-one hidden">+1</span>
                </button>
                <button class="reaction-btn" data-emoji="🚀">
                    <span class="emoji">🚀</span>
                    <span class="plus-one hidden">+1</span>
                </button>
            </div>

            <button id="shareButton" class="massive-cta share-btn">PARTILHAR NO INSTAGRAM</button>
        </div>

        <!-- Toast Notification -->
        <div id="toastNotification" class="toast hidden">
            PREPARANDO STORY PARA O INSTAGRAM...
        </div>
    </div>

    <script src="js/reveal.js"></script>
</body>

</html>
